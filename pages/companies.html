<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <title>Safe Carz Limited - Plans</title>
    <link rel="stylesheet" href="../asserts/css/style.css">
    <link rel="stylesheet" href="../asserts/css/responsive.css">
  </head>

  <body class="bg">
    <nav id="nav"></nav>
    <section class="insurance-plans cont">
      <div class="container-insurance-plans w">
        <h1 class="head-1">Our Partner Companies</h1>
        <p class="para-1">
          Filter insurance plans by your preferred insurance provider
        </p>
        <h2 class="text-center">Select a Company</h2>
        <div class="select-company">
          <div class="select-company-cart" data-type="Zurich Insurance">
            <div class="cm-logo">Z</div>
            <h3>Zurich Insurance</h3>
          </div>
          <div class="select-company-cart" data-type="Jubilee Insurance">
            <div class="cm-logo">J</div>
            <h3>Jubilee Insurance</h3>
          </div>
          <div class="select-company-cart" data-type="Adamjee Insurance">
            <div class="cm-logo">A</div>
            <h3>Adamjee Insurance</h3>
          </div>
          <div class="select-company-cart" data-type="Allianz Insurance">
            <div class="cm-logo sl">AL</div>
            <h3>Allianz Insurance</h3>
          </div>
          <div class="select-company-cart" data-type="Aga Khan Insurance">
            <div class="cm-logo sl">AK</div>
            <h3>Aga Khan Insurance</h3>
          </div>
        </div>
        <div class="row-available-plan">
          <h2 id="companyName">All Insurance Plans</h2>
          <div id="count">9 plans available</div>
        </div>
      </div>
      <div class="cart-container w"></div>
    </section>
    <footer id="footer" class="cont"></footer>
    <script src="../asserts/Js/main.js"></script>
    <script src="../asserts/Js/script.js"></script>
    <script src="../asserts/Js/companies.js"></script>
  </body>
</html>
